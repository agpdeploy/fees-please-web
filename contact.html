<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | Fees Please</title>
    <meta name="description" content="Get support for Fees Please. Submit a support ticket securely or use our spam-protected contact methods.">
    <link rel="canonical" href="https://feesplease.app/contact">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col min-h-screen antialiased bg-[#18181b] text-zinc-200">

    <div id="header-placeholder"></div>

    <main class="flex-grow pt-32 pb-24 px-6 max-w-2xl mx-auto w-full">
        <div class="glass p-8 md:p-12">
            <div style="margin-bottom: 2rem; text-align: center;">
                <span style="font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.2rem 0.6rem; border-radius: 9999px; display: inline-block; margin-bottom: 0.75rem; background: rgba(0, 188, 125, 0.15); border: 1px solid rgba(0, 188, 125, 0.3); color: var(--green);">Secure Support</span>
                <h1 class="text-3xl font-bold mb-2 text-white" style="font-family: 'Outfit', sans-serif;">Contact Us</h1>
                <p class="text-zinc-400 mt-2 text-sm">Submit your enquiry directly to our secure customer support queue.</p>
            </div>

            <!-- Form -->
            <form id="support-contact-form" class="space-y-6">
                <!-- Dropdown -->
                <div>
                    <label for="enquiry-type" class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Type of Enquiry</label>
                    <select id="enquiry-type" name="enquiry-type" required class="w-full bg-[#1e1e24] border border-zinc-800 rounded-lg px-4 py-3 text-sm text-zinc-200 focus:outline-none focus:border-[#00bc7d] transition-colors">
                        <option value="" disabled selected>Select an option...</option>
                        <option value="Registering a team/club">Registering a team/club</option>
                        <option value="Becoming a sponsor">Becoming a sponsor</option>
                        <option value="Billing or Subscription issue">Billing or Subscription issue</option>
                        <option value="Feature Request">Feature Request</option>
                        <option value="General Enquiry">General Enquiry</option>
                    </select>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required class="w-full bg-[#1e1e24] border border-zinc-800 rounded-lg px-4 py-3 text-sm text-zinc-200 focus:outline-none focus:border-[#00bc7d] transition-colors">
                </div>

                <!-- Mobile -->
                <div>
                    <label for="mobile" class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="0400 000 000" required class="w-full bg-[#1e1e24] border border-zinc-800 rounded-lg px-4 py-3 text-sm text-zinc-200 focus:outline-none focus:border-[#00bc7d] transition-colors">
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-2">Enquiry Description</label>
                    <textarea id="description" name="description" rows="5" placeholder="Tell us how we can help..." required class="w-full bg-[#1e1e24] border border-zinc-800 rounded-lg px-4 py-3 text-sm text-zinc-200 focus:outline-none focus:border-[#00bc7d] transition-colors leading-relaxed"></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-primary w-full justify-center py-3 text-sm font-bold mt-2" id="submit-btn">
                    Submit Enquiry
                </button>

                <!-- Error Container -->
                <div id="error-message" class="text-xs text-red-500 hidden text-center mt-2 leading-relaxed bg-red-950/20 border border-red-900/30 p-2.5 rounded-lg"></div>

                <!-- Anti-Spam / Secure Info Note -->
                <p class="text-[11px] text-zinc-500 text-center leading-relaxed mt-4">
                    <i class="fa-solid fa-shield-halved" style="margin-right: 4px; color: var(--green);"></i> 
                    We protect your privacy. Submitting this form sends your details directly to our secure customer support queue.
                </p>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        document.getElementById('support-contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-message');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            errorDiv.classList.add('hidden');
            errorDiv.textContent = '';
            
            const enquiry = document.getElementById('enquiry-type').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const description = document.getElementById('description').value;
            
            // Dynamically detect local testing environments vs production
            const isLocalhost = window.location.hostname === 'localhost' || 
                                window.location.hostname === '127.0.0.1' || 
                                window.location.protocol === 'file:';
                                
            const endpoint = isLocalhost 
                ? 'http://localhost:3000/api/contact' 
                : 'https://app.feesplease.app/api/contact';
            
            fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ enquiry, email, mobile, description })
            })
            .then(async response => {
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to submit enquiry');
                }
                
                // Show Success Screen
                const form = document.getElementById('support-contact-form');
                const displayRef = data.issueKey ? ('#' + data.issueKey.split('-')[1]) : 'Logged';
                
                form.innerHTML = `
                    <div class="text-center py-8">
                        <div style="font-size: 3rem; margin-bottom: 1.5rem;">✅</div>
                        <h3 class="text-white font-extrabold text-2xl mb-3" style="font-family: 'Outfit', sans-serif;">Enquiry Received!</h3>
                        <p class="text-zinc-400 text-sm leading-relaxed mb-6">
                            Thank you for reaching out. We have logged your request directly in our support system. 
                            Your reference is <strong class="text-[#00bc7d]">${displayRef}</strong>.
                        </p>
                        <p class="text-zinc-500 text-xs leading-relaxed">
                            Our team will review your request and follow up with you via email shortly.
                        </p>
                    </div>
                `;
            })
            .catch(error => {
                console.error('Error submitting form:', error);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Enquiry';
                
                // Fallback details if API fails
                errorDiv.classList.remove('hidden');
                errorDiv.innerHTML = `
                    <p class="font-bold mb-1">Submission failed</p>
                    <p class="text-[11px] mb-2">${error.message || 'Unable to reach the support server.'}</p>
                    <p class="text-[11px] text-zinc-400">Please try again or submit your ticket directly via our <a href="https://feespleaseapp.atlassian.net/servicedesk/customer/portal/34/group/34/create/34" target="_blank" rel="noopener" class="underline text-[#00bc7d]">Customer Support Portal</a>.</p>
                `;
            });
        });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
